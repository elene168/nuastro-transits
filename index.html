<style>
  :root { --ntw-width: 340px; }
  .ntw-wrap { width:100%; max-width:var(--ntw-width); font-family:monospace; box-sizing:border-box; }
  .ntw-box { border:1px solid #1a1a1a; padding:20px 22px 16px; background:#fff; box-sizing:border-box; }
  .ntw-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:8px; }
  .ntw-label { font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#333; font-weight:700; }
  .ntw-utc { font-size:10px; color:#999; white-space:nowrap; }
  .ntw-table { width:100%; border-collapse:collapse; }
  .ntw-table th { font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#aaa; font-weight:400; padding:0 0 7px 0; border-bottom:1px solid #e0e0e0; text-align:left; }
  .ntw-table th.r { text-align:right; }
  .ntw-table td { padding:6px 0; border-bottom:0.5px solid #f0f0f0; font-size:13px; color:#111; line-height:1.5; }
  .ntw-table td.sign { color:#555; }
  .ntw-table td.deg { text-align:right; color:#777; white-space:nowrap; }
  .ntw-table tr:last-child td { border-bottom:none; }
  .ntw-rx { font-size:10px; color:#bbb; margin-left:3px; }
  .ntw-footer { font-size:10px; color:#ccc; margin-top:12px; display:flex; justify-content:space-between; }
  @media (max-width:600px) {
    .ntw-wrap { max-width:100%; }
    .ntw-box { padding:16px 18px 14px; }
    .ntw-table td { font-size:14px; padding:7px 0; }
    .ntw-table th { font-size:11px; }
  }
</style>

<div class="ntw-wrap">
  <div class="ntw-box">
    <div class="ntw-head">
      <span class="ntw-label">True Transits</span>

    <table class="ntw-table">
      <thead>
        <tr>

          <th class="r">Degree</th>

      </thead>

      </tbody>
    </table>
    <div class="ntw-footer">
      <span>geocentric · real-sky</span>
      <span>refresh in <span id="ntw-cd">5:00</span></span>
    </div>
  </div>
</div>

    { name:'Moon',    key:'moon'    },
    { name:'Mercury', key:'mercury' },
    { name:'Venus',   key:'venus'   },

  function tick(){
    sec--;
    if(sec<=0){sec=300;render();}
    var m=Math.floor(sec/60), s=sec%60;
    document.getElementById('ntw-cd').textContent=m+':'+String(s).padStart(2,'0');
  }

  render();
  setInterval(tick,1000);
})();
</script>
